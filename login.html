<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link rel="stylesheet" href="css/style.css">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">

        <h2>Login</h2>

        <input type="email" class="form-control mb-3" id="email" placeholder="Enter Email">

        <input type="password" class="form-control mb-3" id="password" placeholder="Enter Password">

        <button class="btn btn-primary w-100" onclick="loginUser()">Login</button>

        <p class="mt-3">Don't have account? <a href="register.html">Register</a></p>

      </div>
    </div>
  </div>
</div>

<div id="popup" class="popup"></div>

<script src="js/popup.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/login.js"></script>

</body>
</html>
